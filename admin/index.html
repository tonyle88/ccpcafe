<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Quản trị | Cafe-CCP</title><link rel="stylesheet" href="style.css"></head><body><main class="admin-shell"><header><div><p class="eyebrow">Cafe-CCP</p><h1>Quản trị nội dung</h1></div><button id="logout" class="secondary" hidden>Đăng xuất</button></header><section id="login-panel" class="panel"><h2>Đăng nhập</h2><form id="login-form"><label>Tên đăng nhập<input id="username" autocomplete="username" required></label><label>Mật khẩu<input id="password" type="password" autocomplete="current-password" required></label><button>Đăng nhập</button><p id="login-error" class="error" role="alert"></p></form></section><section id="dashboard" hidden><div class="panel"><h2>Trạng thái</h2><p id="health"></p><p id="identity"></p></div><div class="tabs"><button data-tab="content">Nội dung</button><button data-tab="packages">Gói dịch vụ</button></div><section id="content-panel" class="panel"><h2>Nội dung</h2><div id="content-list"></div></section><section id="packages-panel" class="panel" hidden><h2>Gói dịch vụ</h2><div id="package-list"></div></section></section><p id="toast" role="status" aria-live="polite"></p></main><script src="../config.js"></script><script src="app.js"></script></body></html>
