<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gMoon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FD4"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gMoonLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
    <radialGradient id="gMoonRadial" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C5B4F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7B5EA7" stop-opacity="1"/>
    </radialGradient>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="32" cy="30" r="25" stroke="url(#gMoon)" stroke-width="0.5" opacity="0.2" stroke-dasharray="2 3"/>

  <!-- Moon body (crescent) -->
  <!-- Full circle first -->
  <circle cx="32" cy="30" r="20" fill="url(#gMoonRadial)" filter="url(#moonGlow)"/>

  <!-- Cut-out circle for crescent effect -->
  <circle cx="40" cy="24" r="17" fill="url(#gMoon)" opacity="0.95"/>

  <!-- Re-draw the visible crescent -->
  <path d="M32 10 Q14 14 12 30 Q10 46 26 52 Q14 48 12 32 Q10 16 26 10 Z" 
        fill="url(#gMoonRadial)" opacity="0"/>

  <!-- Crescent using clip approach -->
  <clipPath id="crescentClip">
    <path d="M32 10 Q44 10 52 18 Q60 26 60 32 Q60 38 52 46 Q44 54 32 54 Q26 54 21 51 Q30 49 36 43 Q46 35 44 24 Q42 14 32 10 Z"/>
  </clipPath>

  <!-- Clean crescent moon shape -->
  <path d="M32 8 C20 8 11 17 11 29 C11 41 20 51 32 54 C20 52 14 42 14 29 C14 16 22 8 32 8 Z"
        fill="url(#gMoonRadial)" filter="url(#moonGlow)"/>
  <path d="M32 8 C24 9 18 15 16 24 C14 33 17 43 25 49 C15 46 9 38 9 29 C9 17 19 7 32 8 Z"
        fill="url(#gMoonLight)" opacity="0.7"/>

  <!-- Stars scattered around the moon -->
  <!-- Large star top right -->
  <g transform="translate(46,12)">
    <line x1="0" y1="-5.5" x2="0" y2="5.5" stroke="#E8A96A" stroke-width="1.4"/>
    <line x1="-5.5" y1="0" x2="5.5" y2="0" stroke="#E8A96A" stroke-width="1.4"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#E8A96A" stroke-width="0.8"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#E8A96A" stroke-width="0.8"/>
  </g>

  <!-- Medium star bottom right -->
  <g transform="translate(50,40)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.7"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.7"/>
  </g>

  <!-- Small star top -->
  <circle cx="36" cy="10" r="1.5" fill="#E8A96A" opacity="0.8"/>
  <!-- Small star middle right -->
  <circle cx="54" cy="28" r="1.2" fill="#C5B4F0" opacity="0.7"/>
  <!-- Tiny stars -->
  <circle cx="42" cy="52" r="1" fill="#E8A96A" opacity="0.6"/>
  <circle cx="55" cy="18" r="0.8" fill="#C5B4F0" opacity="0.8"/>
  <circle cx="49" cy="56" r="0.8" fill="#E8A96A" opacity="0.5"/>

  <!-- Constellation dots on moon surface -->
  <circle cx="18" cy="26" r="1.2" fill="#FBF7FF" opacity="0.3"/>
  <circle cx="16" cy="33" r="0.8" fill="#FBF7FF" opacity="0.25"/>
  <circle cx="20" cy="40" r="1" fill="#FBF7FF" opacity="0.2"/>
</svg>
