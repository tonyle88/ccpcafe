<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gWork" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FD4"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gWorkLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
  </defs>

  <!-- Briefcase handle -->
  <path d="M24 22 Q24 16 32 16 Q40 16 40 22" stroke="url(#gWork)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Briefcase body -->
  <rect x="10" y="22" width="44" height="32" rx="5" fill="url(#gWork)" opacity="0.15"/>
  <rect x="10" y="22" width="44" height="32" rx="5" stroke="url(#gWork)" stroke-width="1.8"/>

  <!-- Inner body fill -->
  <rect x="12" y="24" width="40" height="28" rx="4" fill="#FBF7FF" opacity="0.05"/>

  <!-- Center clasp line -->
  <line x1="10" y1="38" x2="54" y2="38" stroke="url(#gWork)" stroke-width="1.5"/>

  <!-- Clasp/lock mechanism -->
  <rect x="26" y="34" width="12" height="8" rx="2.5" fill="url(#gWork)" opacity="0.8"/>
  <rect x="28" y="36" width="8" height="4" rx="1.5" stroke="url(#gWorkLight)" stroke-width="0.8"/>
  <!-- Keyhole -->
  <circle cx="32" cy="38" r="1.8" fill="#E8A96A"/>
  <rect x="31.3" y="38.5" width="1.4" height="2" rx="0.5" fill="#FBF7FF" opacity="0.8"/>

  <!-- Decorative stitching -->
  <rect x="13" y="25" width="38" height="26" rx="3.5" stroke="url(#gWorkLight)" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 3"/>

  <!-- Briefcase panels lines -->
  <line x1="32" y1="22" x2="32" y2="37" stroke="url(#gWorkLight)" stroke-width="0.5" opacity="0.3"/>
  <line x1="32" y1="39" x2="32" y2="54" stroke="url(#gWorkLight)" stroke-width="0.5" opacity="0.3"/>

  <!-- Ornamental star bottom left -->
  <g transform="translate(17,50)">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#E8A96A" stroke-width="0.9"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#E8A96A" stroke-width="0.9"/>
  </g>
  <!-- Star top right -->
  <g transform="translate(55,18)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.7"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.7"/>
  </g>
</svg>
