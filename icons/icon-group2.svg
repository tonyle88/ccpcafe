<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gP2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FD4"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gP2Light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
  </defs>

  <!-- Person 1 (left, slightly back) -->
  <!-- Head -->
  <circle cx="22" cy="18" r="8.5" fill="url(#gP2)" opacity="0.7"/>
  <circle cx="22" cy="18" r="8.5" stroke="url(#gP2Light)" stroke-width="0.8" opacity="0.5"/>
  <!-- Shimmer on head -->
  <ellipse cx="19" cy="14.5" rx="3.5" ry="2.5" fill="#FBF7FF" opacity="0.2" transform="rotate(-20 19 14.5)"/>

  <!-- Body/torso 1 -->
  <path d="M10 56 Q10 40 22 38 Q34 40 34 56"
        fill="url(#gP2)" opacity="0.7"/>
  <path d="M10 56 Q10 40 22 38 Q34 40 34 56"
        stroke="url(#gP2Light)" stroke-width="0.8" opacity="0.5"/>

  <!-- Person 2 (right, front) -->
  <!-- Head -->
  <circle cx="42" cy="16" r="9.5" fill="url(#gP2)" opacity="0.95"/>
  <circle cx="42" cy="16" r="9.5" stroke="url(#gP2Light)" stroke-width="1"/>
  <!-- Shimmer on head 2 -->
  <ellipse cx="38.5" cy="12" rx="4" ry="2.8" fill="#FBF7FF" opacity="0.22" transform="rotate(-20 38.5 12)"/>

  <!-- Body/torso 2 -->
  <path d="M28 56 Q28 38 42 36 Q56 38 56 56"
        fill="url(#gP2)" opacity="0.95"/>
  <path d="M28 56 Q28 38 42 36 Q56 38 56 56"
        stroke="url(#gP2Light)" stroke-width="1"/>

  <!-- Stars between them (connection symbol) -->
  <g transform="translate(32,30)">
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#E8A96A" stroke-width="1.3"/>
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#E8A96A" stroke-width="1.3"/>
    <line x1="-3" y1="-3" x2="3" y2="3" stroke="#E8A96A" stroke-width="0.8"/>
    <line x1="3" y1="-3" x2="-3" y2="3" stroke="#E8A96A" stroke-width="0.8"/>
  </g>

  <!-- Small stars -->
  <circle cx="8" cy="32" r="1.2" fill="#E8A96A" opacity="0.6"/>
  <circle cx="56" cy="32" r="1.2" fill="#C5B4F0" opacity="0.6"/>
</svg>
