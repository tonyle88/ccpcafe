<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gCards" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gCardsLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
    <linearGradient id="gCardFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C1F4A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5C3A1A" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Card 1 - left, rotated -20deg -->
  <g transform="rotate(-20 32 40)">
    <rect x="18" y="18" width="22" height="34" rx="3" fill="url(#gCards)" opacity="0.9"/>
    <rect x="20" y="20" width="18" height="30" rx="2" fill="url(#gCardFace)"/>
    <!-- Card 1 inner design - sun/moon symbol -->
    <circle cx="29" cy="30" r="5" stroke="url(#gCardsLight)" stroke-width="1" opacity="0.8"/>
    <circle cx="29" cy="30" r="2.5" fill="url(#gCardsLight)" opacity="0.6"/>
    <!-- Card border decorations -->
    <rect x="21" y="21" width="16" height="28" rx="1.5" stroke="url(#gCardsLight)" stroke-width="0.5" opacity="0.4"/>
    <!-- Stars on card -->
    <polygon points="29,21.5 29.8,24 32.5,24 30.3,25.5 31.1,28 29,26.5 26.9,28 27.7,25.5 25.5,24 28.2,24"
             fill="url(#gCardsLight)" opacity="0.7" transform="scale(0.5) translate(29,20)"/>
  </g>

  <!-- Card 2 - right, rotated +18deg -->
  <g transform="rotate(18 32 40)">
    <rect x="24" y="15" width="22" height="34" rx="3" fill="url(#gCards)" opacity="0.85"/>
    <rect x="26" y="17" width="18" height="30" rx="2" fill="url(#gCardFace)"/>
    <!-- Card 2 inner design -->
    <circle cx="35" cy="27" r="5" stroke="url(#gCardsLight)" stroke-width="1" opacity="0.8"/>
    <!-- Crescent inside -->
    <path d="M35 22 Q30 24 30 27 Q30 30 35 32 Q29 31 28 27 Q27 22 32 20 Q33.5 19.5 35 20Z"
          fill="url(#gCardsLight)" opacity="0.6"/>
    <rect x="27" y="18" width="16" height="28" rx="1.5" stroke="url(#gCardsLight)" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Card 3 - center, front card -->
  <rect x="21" y="12" width="22" height="34" rx="3.5" fill="url(#gCards)"/>
  <!-- Card back pattern (Clow-style) -->
  <rect x="23" y="14" width="18" height="30" rx="2.5" fill="url(#gCardFace)"/>

  <!-- Clow card back design - magic circle -->
  <circle cx="32" cy="29" r="9" stroke="url(#gCardsLight)" stroke-width="0.8" opacity="0.7"/>
  <circle cx="32" cy="29" r="6" stroke="url(#gCardsLight)" stroke-width="0.6" opacity="0.5"/>

  <!-- Star in center -->
  <polygon points="32,22 33.5,27 38.5,27 34.5,30 36,35 32,32 28,35 29.5,30 25.5,27 30.5,27"
           fill="url(#gCardsLight)" opacity="0.85"/>

  <!-- Sun/moon detail -->
  <circle cx="32" cy="29" r="3" fill="#E8A96A" opacity="0.9"/>
  <circle cx="32" cy="29" r="1.5" fill="#FBF7FF"/>

  <!-- Card border ornament -->
  <rect x="24" y="15" width="16" height="28" rx="2" stroke="#E8A96A" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner stars on main card -->
  <circle cx="25.5" cy="17" r="1.2" fill="#E8A96A" opacity="0.7"/>
  <circle cx="38.5" cy="17" r="1.2" fill="#E8A96A" opacity="0.7"/>
  <circle cx="25.5" cy="41" r="1.2" fill="#E8A96A" opacity="0.7"/>
  <circle cx="38.5" cy="41" r="1.2" fill="#E8A96A" opacity="0.7"/>

  <!-- Bottom card edge -->
  <line x1="21" y1="44" x2="43" y2="44" stroke="url(#gCardsLight)" stroke-width="1.2" opacity="0.5"/>

  <!-- Top sparkle -->
  <g transform="translate(32,7)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#E8A96A" stroke-width="1.3"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#E8A96A" stroke-width="1.3"/>
    <line x1="-2.5" y1="-2.5" x2="2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.8"/>
    <line x1="2.5" y1="-2.5" x2="-2.5" y2="2.5" stroke="#E8A96A" stroke-width="0.8"/>
  </g>

  <!-- Side sparkles -->
  <g transform="translate(55,25)" opacity="0.7">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#C5B4F0" stroke-width="0.9"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#C5B4F0" stroke-width="0.9"/>
  </g>
  <g transform="translate(9,50)" opacity="0.6">
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#E8A96A" stroke-width="0.9"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#E8A96A" stroke-width="0.9"/>
  </g>
</svg>
