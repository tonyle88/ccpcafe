<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FD4"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
  </defs>

  <!-- Book/document base -->
  <rect x="15" y="28" width="34" height="26" rx="3" fill="url(#gGrad)" opacity="0.15"/>
  <rect x="15" y="28" width="34" height="26" rx="3" stroke="url(#gGrad)" stroke-width="1.5"/>

  <!-- Book spine detail -->
  <line x1="15" y1="28" x2="15" y2="54" stroke="url(#gGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pages stacked effect -->
  <rect x="17" y="30" width="30" height="22" rx="2" fill="#FBF7FF" opacity="0.06"/>

  <!-- Lines on book/diploma -->
  <line x1="22" y1="38" x2="42" y2="38" stroke="url(#gGradLight)" stroke-width="1" opacity="0.5"/>
  <line x1="22" y1="43" x2="38" y2="43" stroke="url(#gGradLight)" stroke-width="1" opacity="0.4"/>
  <line x1="22" y1="48" x2="36" y2="48" stroke="url(#gGradLight)" stroke-width="1" opacity="0.3"/>

  <!-- Graduation cap board (mortarboard) -->
  <!-- Cap top flat part -->
  <polygon points="32,8 58,18 32,25 6,18" fill="url(#gGrad)" opacity="0.9"/>
  <!-- Cap top border -->
  <polygon points="32,8 58,18 32,25 6,18" stroke="url(#gGradLight)" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Cap brim line -->
  <line x1="6" y1="18" x2="58" y2="18" stroke="url(#gGradLight)" stroke-width="0.6" opacity="0.4"/>

  <!-- Center top button & tassel base -->
  <circle cx="32" cy="16.5" r="2.5" fill="#E8A96A"/>

  <!-- Cap crown (3D box) -->
  <path d="M32 25 L32 30" stroke="url(#gGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crown top box -->
  <polygon points="23,30 41,30 38,25 26,25" fill="url(#gGrad)" opacity="0.7"/>
  <!-- Crown front face -->
  <rect x="23" y="30" width="18" height="5" rx="1" fill="url(#gGrad)" opacity="0.85"/>

  <!-- Tassel (right side) -->
  <line x1="49" y1="17" x2="53" y2="28" stroke="url(#gGradLight)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tassel strings -->
  <line x1="53" y1="28" x2="51" y2="37" stroke="url(#gGradLight)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="53" y1="28" x2="53" y2="37" stroke="url(#gGradLight)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="53" y1="28" x2="55" y2="37" stroke="url(#gGradLight)" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="53" cy="28" r="2" fill="#E8A96A"/>

  <!-- Star accent -->
  <g transform="translate(10,10)">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#E8A96A" stroke-width="1"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#E8A96A" stroke-width="1"/>
    <line x1="-2.2" y1="-2.2" x2="2.2" y2="2.2" stroke="#E8A96A" stroke-width="0.7"/>
    <line x1="2.2" y1="-2.2" x2="-2.2" y2="2.2" stroke="#E8A96A" stroke-width="0.7"/>
  </g>

  <!-- Seal/ribbon on diploma -->
  <circle cx="40" cy="48" r="5" fill="url(#gGrad)" opacity="0.7"/>
  <circle cx="40" cy="48" r="3.5" stroke="#E8A96A" stroke-width="0.8" opacity="0.8"/>
  <circle cx="40" cy="48" r="1.5" fill="#E8A96A"/>
</svg>
