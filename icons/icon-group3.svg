<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gP3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9B6FD4"/>
      <stop offset="100%" stop-color="#C87941"/>
    </linearGradient>
    <linearGradient id="gP3Light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C5B4F0"/>
      <stop offset="100%" stop-color="#E8A96A"/>
    </linearGradient>
  </defs>

  <!-- Person 1 (far left, back) -->
  <circle cx="12" cy="20" r="7" fill="url(#gP3)" opacity="0.55"/>
  <path d="M3 56 Q3 44 12 42 Q21 44 21 56" fill="url(#gP3)" opacity="0.55"/>

  <!-- Person 3 (far right, back) -->
  <circle cx="52" cy="20" r="7" fill="url(#gP3)" opacity="0.55"/>
  <path d="M43 56 Q43 44 52 42 Q61 44 61 56" fill="url(#gP3)" opacity="0.55"/>

  <!-- Person 2 (center, front) -->
  <circle cx="32" cy="16" r="9" fill="url(#gP3)" opacity="0.95"/>
  <circle cx="32" cy="16" r="9" stroke="url(#gP3Light)" stroke-width="1"/>
  <!-- Shimmer -->
  <ellipse cx="28.5" cy="12" rx="3.8" ry="2.6" fill="#FBF7FF" opacity="0.22" transform="rotate(-20 28.5 12)"/>

  <path d="M19 56 Q19 37 32 35 Q45 37 45 56" fill="url(#gP3)" opacity="0.95"/>
  <path d="M19 56 Q19 37 32 35 Q45 37 45 56" stroke="url(#gP3Light)" stroke-width="1"/>

  <!-- Stars connecting all three (triangle constellation) -->
  <!-- Top center star -->
  <g transform="translate(32,8)">
    <line x1="0" y1="-3.5" x2="0" y2="3.5" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-3.5" y1="0" x2="3.5" y2="0" stroke="#E8A96A" stroke-width="1.1"/>
    <line x1="-2.2" y1="-2.2" x2="2.2" y2="2.2" stroke="#E8A96A" stroke-width="0.7"/>
    <line x1="2.2" y1="-2.2" x2="-2.2" y2="2.2" stroke="#E8A96A" stroke-width="0.7"/>
  </g>

  <!-- Small connecting dots -->
  <circle cx="10" cy="30" r="1.2" fill="#E8A96A" opacity="0.5"/>
  <circle cx="54" cy="30" r="1.2" fill="#C5B4F0" opacity="0.5"/>

  <!-- Shimmer on left person -->
  <ellipse cx="9" cy="16.5" rx="3" ry="2.2" fill="#FBF7FF" opacity="0.18" transform="rotate(-20 9 16.5)"/>
  <!-- Shimmer on right person -->
  <ellipse cx="49" cy="16.5" rx="3" ry="2.2" fill="#FBF7FF" opacity="0.18" transform="rotate(-20 49 16.5)"/>

  <!-- Borders on back people -->
  <circle cx="12" cy="20" r="7" stroke="url(#gP3Light)" stroke-width="0.6" opacity="0.35"/>
  <circle cx="52" cy="20" r="7" stroke="url(#gP3Light)" stroke-width="0.6" opacity="0.35"/>
</svg>
